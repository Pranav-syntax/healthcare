<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="error-page">
    <div class="error-container">
        <div class="error-content">
            <div class="error-animation">
                <div class="error-number">5</div>
                <div class="error-icon error-icon-danger">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10" stroke-width="2"/>
                        <line x1="15" y1="9" x2="9" y2="15" stroke-width="2" stroke-linecap="round"/>
                        <line x1="9" y1="9" x2="15" y2="15" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="error-number">0</div>
            </div>
            <h1>Server Error</h1>
            <p>Something went wrong on our end. Our team has been notified and we're working on a fix.</p>
            <div class="error-buttons">
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2"/>
                    </svg>
                    Go Home
                </a>
                <a href="javascript:location.reload()" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="23 4 23 10 17 10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Try Again
                </a>
            </div>
        </div>
    </div>
</body>
</html>
