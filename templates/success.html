<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="success-page">
    <div class="success-container">
        <div class="success-content">
            <div class="success-checkmark">
                <svg class="checkmark" viewBox="0 0 52 52">
                    <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                    <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                </svg>
            </div>
            <h1>Success!</h1>
            <p>{{ message if message else 'Operation completed successfully!' }}</p>
            <a href="{{ redirect_url if redirect_url else url_for('dashboard') }}" class="btn btn-primary">Continue</a>
        </div>
    </div>

    <script>
        // Auto redirect after 3 seconds
        setTimeout(function() {
            window.location.href = "{{ redirect_url if redirect_url else url_for('dashboard') }}";
        }, 3000);
    </script>
</body>
</html>
